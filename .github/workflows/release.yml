name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: install npm dependencies
        run: npm ci

      - name: build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "iiiahalab downloader __VERSION__"
          releaseBody: |
            See the assets below to download.

            - Windows: download `iiiahalab-downloader.exe` (portable, no install required) or the `.msi` (installer).
            - macOS: download the `.dmg`.

            On first run on Windows, SmartScreen may warn — click `More info → Run anyway`.
            On first run on macOS, right-click the app → `Open`.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: false

      - name: upload portable Windows .exe
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          gh release upload ${{ github.ref_name }} src-tauri/target/release/iiiahalab-downloader.exe --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

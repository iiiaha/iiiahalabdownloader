name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: install npm dependencies
        run: npm ci

      - name: build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "iiiahalab downloader __VERSION__"
          releaseBody: |
            See the assets below to download.

            - Windows: download `iiiahalab-downloader.exe` (portable, no install required) or the `.msi` (installer).
            - macOS: download the `.dmg`.

            On first run on Windows, SmartScreen may warn — click `More info → Run anyway`.
            On first run on macOS, right-click the app → `Open`.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: false

      - name: upload portable Windows .exe
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          gh release upload ${{ github.ref_name }} src-tauri/target/release/iiiahalab-downloader.exe --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: upload Mac .dmg with stable name
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          # universal-apple-darwin 빌드 산출물의 .dmg 를 버전 없는 고정 이름으로 한 부 더 업로드.
          # 사이트의 다운로드 배너가 latest/download/iiiahalab-downloader.dmg 영구 URL 을 쓰도록.
          src=$(ls src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg 2>/dev/null | head -1)
          if [ -z "$src" ]; then
            src=$(ls src-tauri/target/release/bundle/dmg/*.dmg 2>/dev/null | head -1)
          fi
          if [ -z "$src" ]; then
            echo "No .dmg found under target/" >&2
            ls -R src-tauri/target/*/release/bundle/ 2>/dev/null || true
            exit 1
          fi
          echo "Uploading $src as iiiahalab-downloader.dmg"
          cp "$src" ./iiiahalab-downloader.dmg
          gh release upload ${{ github.ref_name }} ./iiiahalab-downloader.dmg --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

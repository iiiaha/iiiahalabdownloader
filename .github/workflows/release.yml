name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: install npm dependencies
        run: npm ci

      - name: build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # 키는 password 없이 생성되었지만 tauri-cli 가 env var 미설정 시
          # interactive prompt 를 시도해 signing 이 silent skip 되는 버그가 있음.
          # GitHub Secrets 는 빈 값을 거부하므로 워크플로 YAML 에 직접 빈 문자열로 박는다.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "iiiahalab downloader __VERSION__"
          releaseBody: |
            See the assets below to download.

            - Windows: download `iiiahalab-downloader.exe` (portable, no install required) or the `.msi` (installer).
            - macOS: download the `.dmg`.

            On first run on Windows, SmartScreen may warn — click `More info → Run anyway`.
            On first run on macOS, right-click the app → `Open`.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: false

      - name: upload portable Windows .exe
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          gh release upload ${{ github.ref_name }} src-tauri/target/release/iiiahalab-downloader.exe --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: upload Mac .dmg with stable name
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          # universal-apple-darwin 빌드 산출물의 .dmg 를 버전 없는 고정 이름으로 한 부 더 업로드.
          # 사이트의 다운로드 배너가 latest/download/iiiahalab-downloader.dmg 영구 URL 을 쓰도록.
          src=$(ls src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg 2>/dev/null | head -1)
          if [ -z "$src" ]; then
            src=$(ls src-tauri/target/release/bundle/dmg/*.dmg 2>/dev/null | head -1)
          fi
          if [ -z "$src" ]; then
            echo "No .dmg found under target/" >&2
            ls -R src-tauri/target/*/release/bundle/ 2>/dev/null || true
            exit 1
          fi
          echo "Uploading $src as iiiahalab-downloader.dmg"
          cp "$src" ./iiiahalab-downloader.dmg
          gh release upload ${{ github.ref_name }} ./iiiahalab-downloader.dmg --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # === Manual updater signing — tauri-action 의 자체 signing 이 silent skip 되는 이슈 우회 ===
      # 빌드 산출물에 minisign 으로 직접 서명하고 latest.json 매니페스트를 만들어 릴리스에 첨부.
      # 로컬에서 echo "" | npx tauri signer sign 으로 동작 확인된 흐름 그대로 CI 에서 재현.
      - name: sign updater artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          # 진단
          echo "=== bundle tree (target/) ==="
          find src-tauri/target -path '*/bundle/*' -type f 2>/dev/null | head -50 || true
          echo "=== end tree ==="

          KEY_FILE=$(mktemp)
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > "$KEY_FILE"

          NSIS=$(find src-tauri/target -path '*/bundle/nsis/*-setup.exe' -type f 2>/dev/null | head -1)
          MSI=$(find src-tauri/target -path '*/bundle/msi/*.msi' -type f 2>/dev/null | head -1)

          WIN_SIG=""
          WIN_NAME=""
          if [ -n "$NSIS" ]; then
            echo "Signing NSIS: $NSIS"
            echo "" | npx tauri signer sign -f "$KEY_FILE" "$NSIS" || true
            if [ -f "${NSIS}.sig" ]; then
              gh release upload ${{ github.ref_name }} "${NSIS}.sig" --clobber || true
              WIN_SIG=$(cat "${NSIS}.sig")
              WIN_NAME=$(basename "$NSIS")
            fi
          fi
          if [ -n "$MSI" ]; then
            echo "Signing MSI: $MSI"
            echo "" | npx tauri signer sign -f "$KEY_FILE" "$MSI" || true
            if [ -f "${MSI}.sig" ]; then
              gh release upload ${{ github.ref_name }} "${MSI}.sig" --clobber || true
              # MSI 우선
              WIN_SIG=$(cat "${MSI}.sig")
              WIN_NAME=$(basename "$MSI")
            fi
          fi

          rm -f "$KEY_FILE"

          mkdir -p _updater
          if [ -n "$WIN_SIG" ]; then
            echo "$WIN_SIG" > _updater/win.sig
            echo "$WIN_NAME" > _updater/win.name
            echo "Win sig captured: $WIN_NAME"
          else
            echo "WARN: no Win sig produced"
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: sign updater artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          # 진단 — bundle 산출물 트리 전체 출력 후 .tar.gz 찾기
          echo "=== bundle tree (target/) ==="
          find src-tauri/target -path '*/bundle/*' -type f 2>/dev/null | head -50 || true
          echo "=== end tree ==="

          # macOS updater 형식 = .app.tar.gz 또는 .tar.gz
          TAR=$(find src-tauri/target -path '*/bundle/macos/*.app.tar.gz' -type f 2>/dev/null | head -1)
          if [ -z "$TAR" ]; then
            echo "WARN: no .app.tar.gz under bundle/macos/ — tauri-action 이 updater bundle 을 안 만든 듯. Mac 자가업데이트 이번 릴리스엔 미포함 (build 는 계속)."
            mkdir -p _updater
            exit 0
          fi

          echo "Found Mac updater tarball: $TAR"
          KEY_FILE=$(mktemp)
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > "$KEY_FILE"
          echo "" | npx tauri signer sign -f "$KEY_FILE" "$TAR"
          rm -f "$KEY_FILE"

          if [ ! -f "${TAR}.sig" ]; then
            echo "ERROR: signing produced no .sig file" >&2
            mkdir -p _updater
            exit 0
          fi

          gh release upload ${{ github.ref_name }} "${TAR}.sig" --clobber || true
          MAC_SIG=$(cat "${TAR}.sig")
          MAC_NAME=$(basename "$TAR")
          mkdir -p _updater
          echo "$MAC_SIG" > _updater/mac.sig
          echo "$MAC_NAME" > _updater/mac.name
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 두 잡이 _updater 디렉토리를 통해 sig 값을 공유하도록 artifact 업/다운로드.
      - name: upload updater fragments
        uses: actions/upload-artifact@v4
        with:
          name: updater-${{ matrix.platform }}
          path: _updater/
          if-no-files-found: ignore
          retention-days: 1

  # 두 빌드 잡이 끝나면 sig 조각들을 모아 latest.json 을 만들어 릴리스에 업로드.
  publish-updater-manifest:
    needs: build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: download updater fragments
        uses: actions/download-artifact@v4
        with:
          path: _frag/
          pattern: updater-*

      - name: compose latest.json
        shell: bash
        run: |
          set -e
          WIN_SIG=$(cat _frag/updater-windows-latest/win.sig 2>/dev/null || echo "")
          WIN_NAME=$(cat _frag/updater-windows-latest/win.name 2>/dev/null || echo "")
          MAC_SIG=$(cat _frag/updater-macos-latest/mac.sig 2>/dev/null || echo "")
          MAC_NAME=$(cat _frag/updater-macos-latest/mac.name 2>/dev/null || echo "")

          VERSION="${GITHUB_REF_NAME#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"

          # JSON 안전하게 만들기 위해 jq 사용.
          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg win_sig "$WIN_SIG" \
            --arg win_url "$BASE/$WIN_NAME" \
            --arg mac_sig "$MAC_SIG" \
            --arg mac_url "$BASE/$MAC_NAME" \
            '{
              version: $version,
              notes: "See the GitHub release for changelog.",
              pub_date: $pub_date,
              platforms: (
                (if $win_sig != "" then {"windows-x86_64": {signature: $win_sig, url: $win_url}} else {} end)
                +
                (if $mac_sig != "" then {
                  "darwin-aarch64": {signature: $mac_sig, url: $mac_url},
                  "darwin-x86_64":  {signature: $mac_sig, url: $mac_url}
                } else {} end)
              )
            }' > latest.json

          echo "=== latest.json ==="
          cat latest.json

      - name: upload latest.json to release
        shell: bash
        run: |
          gh release upload ${{ github.ref_name }} latest.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
